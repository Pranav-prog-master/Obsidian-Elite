version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edumentor_backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      DB_SSL: ${DB_SSL:-require}
      SECRET_KEY: ${SECRET_KEY:-your_jwt_secret_key_here_change_in_production}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 1440
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_uploads:/app/uploads
    networks:
      - edumentor
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edumentor_frontend
    environment:
      VITE_API_URL: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - edumentor
    command: npm run dev -- --host

volumes:
  backend_uploads:

networks:
  edumentor:
    driver: bridge
